<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Viva Sustentável</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="topo">
        <h1>🌱 Fazenda Viva Sustentável</h1>
        <p>Plante, cultive e colha sua produção de forma sustentável</p>
    </header>

    <main class="container">

        <!-- PAINEL DO JOGO -->
        <section class="painel">

            <div class="info">
                <p>🌾 Pontos: <span id="pontos">0</span></p>
                <p>📦 Plantas: <span id="plantas">0</span></p>
            </div>

            <button id="btnPlantar">🌱 Plantar</button>

            <p id="mensagem">Clique em plantar para começar sua fazenda</p>

        </section>

        <!-- ÁREA DA FAZENDA -->
        <section id="fazenda" class="fazenda">
            <!-- plantas vão aparecer aqui via JS -->
        </section>

    </main>

    <footer class="rodape">
        <p>Projeto Agrinho - Agro forte, futuro sustentável</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
